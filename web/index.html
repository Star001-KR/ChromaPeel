<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>ChromaPeel — 크로마 키 제거</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>ChromaPeel</h1>
    <span class="subtitle">크로마 키 → 투명 PNG</span>
  </header>

  <main>
    <section class="mode-switch" role="tablist" aria-label="모드">
      <label class="mode-tab">
        <input type="radio" name="mode" value="chroma" checked />
        <span>크로마 키 제거</span>
      </label>
      <label class="mode-tab">
        <input type="radio" name="mode" value="crop" />
        <span>크롭</span>
      </label>
    </section>

    <div class="mode-pane" data-mode="chroma">
      <section class="previews" aria-label="미리보기">
        <figure class="preview">
          <figcaption>입력</figcaption>
          <div class="canvas-wrap">
            <canvas id="sourceCanvas"></canvas>
            <p id="emptyHint" class="empty-hint">
              이미지를 선택하거나<br/>여기로 드래그하세요
            </p>
          </div>
        </figure>
        <figure class="preview">
          <figcaption>결과 (투명)</figcaption>
          <div class="canvas-wrap checker">
            <canvas id="resultCanvas"></canvas>
          </div>
        </figure>
      </section>

      <section class="actions">
        <label class="file-btn">
          <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" />
          <span>이미지 선택</span>
        </label>
        <button id="saveBtn" class="primary" disabled>저장 / 공유</button>
      </section>

      <section class="filename" aria-label="결과 파일명">
        <label for="filenameInput">결과 파일명</label>
        <div class="filename-input">
          <input id="filenameInput" type="text" autocomplete="off"
                 spellcheck="false" placeholder="이미지 선택 후 자동 입력" />
          <span class="ext">.png</span>
        </div>
      </section>

      <section class="params" aria-label="파라미터">
        <div class="row">
          <label for="colorPicker">대상 색상</label>
          <input id="colorPicker" type="color" value="#ff25ff" />
          <span id="colorLabel" class="muted">(255, 37, 255)</span>
          <label class="check">
            <input id="autoDetect" type="checkbox" />
            자동 감지
          </label>
        </div>

        <div class="row">
          <label for="tolerance">Tolerance</label>
          <input id="tolerance" type="range" min="0" max="255" value="20" />
          <span id="toleranceVal" class="num">20</span>
        </div>

        <div class="row">
          <label for="feather">Feather</label>
          <input id="feather" type="range" min="0" max="300" value="100" />
          <span id="featherVal" class="num">100</span>
        </div>

        <div class="row">
          <label for="edgeErosion">Edge Erosion</label>
          <input id="edgeErosion" type="range" min="0" max="10" value="1" />
          <span id="edgeErosionVal" class="num">1</span>
        </div>

        <div class="row">
          <label class="check">
            <input id="decontaminate" type="checkbox" checked />
            Decontaminate
          </label>
          <button id="resetBtn" class="ghost">기본값 복원</button>
        </div>
      </section>

      <p id="status" class="status" role="status"></p>
    </div>

    <div class="mode-pane" data-mode="crop" hidden>
      <section class="actions">
        <label class="file-btn">
          <input id="cropFileInput" type="file" accept="image/png,image/jpeg,image/webp" />
          <span>이미지 선택</span>
        </label>
        <button id="cropApplyBtn" class="primary" disabled>잘라내기</button>
      </section>

      <section class="previews" aria-label="크롭 미리보기">
        <figure class="preview">
          <figcaption>입력 (드래그로 영역 선택)</figcaption>
          <div class="canvas-wrap" id="cropCanvasWrap">
            <canvas id="cropCanvas"></canvas>
            <p id="cropEmptyHint" class="empty-hint">
              이미지를 선택하세요
            </p>
          </div>
        </figure>
        <figure class="preview">
          <figcaption>결과 미리보기</figcaption>
          <div class="canvas-wrap">
            <canvas id="cropResultCanvas"></canvas>
            <p id="cropResultHint" class="empty-hint">
              영역을 선택 후<br/>잘라내기를 누르세요
            </p>
          </div>
        </figure>
      </section>

      <section class="crop-info" aria-label="크롭 좌표">
        <span class="crop-info-label">좌표</span>
        <span id="cropCoords" class="crop-coords">x: 0, y: 0, w: 0, h: 0</span>
        <button id="cropDownloadBtn" class="ghost" disabled>다운로드</button>
      </section>

      <p id="cropStatus" class="status" role="status"></p>
    </div>
  </main>

  <footer>
    <a href="https://github.com/Star001-KR/ChromaPeel" target="_blank" rel="noopener">GitHub</a>
    · 데스크톱 Python 앱 + 모바일/웹 버전
  </footer>

  <script src="app.js"></script>
</body>
</html>
